name: Build SmartTube

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out SmartTube (enhanced)
        uses: actions/checkout@v4
        with:
          repository: AltafYafai/smarttube-enhanced
          ref: master
          path: SmartTube
          submodules: recursive
          token: ${{ secrets.PAT || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Switch to JDK 14 for build
        uses: actions/setup-java@v4
        with:
          java-version: 14
          distribution: zulu

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: SmartTube

      - name: Build debug APK
        run: ./gradlew clean assembleStstableDebug --no-daemon --stacktrace
        working-directory: SmartTube

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smarttube-debug
          path: SmartTube/**/build/outputs/apk/**/*.apk

      - name: Upload to Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not set, skipping upload."
            exit 0
          fi
          shopt -s globstar nullglob
          for apk in SmartTube/**/build/outputs/apk/**/*.apk; do
            echo "Uploading $(basename "$apk")..."
            response=$(curl -s -F "chat_id=$TG_CHAT_ID" \
              -F "document=@$apk" \
              -F "caption=SmartTube Enhanced %23$RUN_ID" \
              "https://api.telegram.org/bot$TG_TOKEN/sendDocument")
            echo "$response" | grep -q '"ok":true' && echo "OK" || echo "FAIL: $response"
          done
