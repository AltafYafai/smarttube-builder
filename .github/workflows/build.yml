name: Build SmartTube

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out SmartTube
        uses: actions/checkout@v4
        with:
          repository: yuliskov/SmartTube
          ref: master
          path: SmartTube
          submodules: recursive

      - name: Set up JDK 14
        uses: actions/setup-java@v4
        with:
          java-version: 14
          distribution: zulu

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-34 build-tools;34.0.0
          accept-android-sdk-licenses: true

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: SmartTube

      - name: Build debug APK
        run: ./gradlew clean assembleStstableDebug --no-daemon --stacktrace
        working-directory: SmartTube

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smarttube-debug
          path: SmartTube/**/build/outputs/apk/**/*.apk
