name: Build SmartTube

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out SmartTube (enhanced)
        uses: actions/checkout@v4
        with:
          repository: AltafYafai/smarttube-enhanced
          ref: master
          path: SmartTube
          submodules: recursive
          token: ${{ secrets.PAT || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: SmartTube

      - name: Configure signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 --decode > SmartTube/key.jks
            echo "storePassword=$KEY_STORE_PASSWORD" > SmartTube/keystore.properties
            echo "keyAlias=$ALIAS" >> SmartTube/keystore.properties
            echo "keyPassword=$KEY_PASSWORD" >> SmartTube/keystore.properties
            echo "storeFile=${{ github.workspace }}/SmartTube/key.jks" >> SmartTube/keystore.properties
            echo "Signing configured."
          else
            echo "No signing key found, building unsigned."
          fi

      - name: Build signed release APK
        run: |
          if [ -f keystore.properties ]; then
            ./gradlew clean assembleStstableRelease --no-daemon --stacktrace
          else
            echo "No keystore, skipping release build."
          fi
        working-directory: SmartTube

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: smarttube-apks
          path: SmartTube/**/build/outputs/apk/**/*.apk

      - name: Upload signed universal APK to Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not set, skipping upload."
            exit 0
          fi
          apk=$(find SmartTube -path "*/release/*universal*.apk" 2>/dev/null | head -1)
          if [ -z "$apk" ]; then
            apk=$(find SmartTube -path "*/release/*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$apk" ]; then
            echo "No release APK found."
            exit 0
          fi
          echo "Uploading $(basename "$apk")..."
          curl -s -F "chat_id=$TG_CHAT_ID" \
            -F "document=@$apk" \
            -F "caption=SmartTube Enhanced %23$RUN_ID" \
            "https://api.telegram.org/bot$TG_TOKEN/sendDocument" | grep -q '"ok":true' && echo "OK" || echo "FAIL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: build-${{ github.run_id }}
          name: SmartTube Enhanced build ${{ github.run_id }}
          body: |
            Automated build from SmartTube Enhanced private repo.
            Triggered by commit on master branch.
          files: SmartTube/**/build/outputs/apk/**/*.apk
          fail_on_unmatched_files: false
          make_latest: true
